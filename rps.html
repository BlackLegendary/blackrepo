<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissor</title>
  </head>
    <style>
      body {
        display: grid;
        place-items: center;
        margin: 0;
      }
    .auto{margin-left: 30px;}
    .ret,.auto{
      width: 120px;align-items: center;
      height: 50px;color: white;
      border: none;background-color: black;
      font-weight: 700;font-size: 19px;cursor: pointer;
      margin-top: 20px;
    }
    .re{font-weight: 700;}
    h1,.re{
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      font-size: 39px; 
    }
    .st,.sc{
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      font-size: 32px; 
    }
    .rob,.papb,.scib{
      width: 200px;
      height: 200px;
      border-radius: 100px;
      border-style: solid;margin-left: 40px;
      margin-top: 50px;
      cursor: pointer;
      object-fit: cover;
      object-position: top;
      border-radius: 100px;
      border: none;
    }
    .ro,.pap,.sci{
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border-style: solid;
      object-fit: cover;
      object-position: top;
    }
    </style>
  </head>
  <body>
    <H1>Rock Paper Scissor</H1>
    <div class="choices">
      <button class="rob"><img class="ro" src="rock-band-logo-metal-typography-vector-44668336.avif"></button>
      <button class="papb"><img class="pap" src="pngtree-paper-roll-logo-icon-template-png-image_1869837.jpg"></button>
      <button class="scib"><img class="sci" src="barber-tool-scissors-logo-icon-background-symbol-free-vector.jpg"></button>
    </div>
    <div class="text">
      <p class="re">score board</p>
      <p class="st"></p>
      <p class="sc"></p>
    </div>
    <div class="button">
      <button class="ret">reset</button>
      <button class="auto">auto-play</button>
    </div>
  </body>
  <script>
    var score=JSON.parse(localStorage.getItem('score'))||{
      wins: 0,
      loses: 0,
      ties: 0
    };
    document.querySelector('.ret').addEventListener('click',()=>{localStorage.removeItem('score');scupdate();})
    let auto=false;
    let id=null;
    function scupdate(){
      score={
        wins: 0,
        loses: 0,
        ties: 0
      }
      document.querySelector('.sc').innerHTML=`
      wins: ${score.wins} loses: ${score.loses} ties: ${score.ties}`;
      localStorage.setItem('score',JSON.stringify(score));
    }
    document.querySelector('.rob').addEventListener('click',()=>{play('rock')});
    document.querySelector('.papb').addEventListener('click',()=>{play('paper')});
    document.querySelector('.scib').addEventListener('click',()=>{play('scissor')});
    document.querySelector('.auto').addEventListener('click',autoplay);
    addEventListener('keydown',(event)=>{
      const key= event.key.toLowerCase();
      if(key==='r') play('rock');
      else if(key==='s') play('scissor');
      else if(key==='p') play('paper');
      else if(key==='a') autoplay();
      else if(key==='x'){{localStorage.removeItem('score');scupdate();} 
    }})
    function autoplay(){
      auto=!auto
      if(auto){
        id=setInterval(()=>{play(comp())},1000);
      }
      else{clearInterval(id);}
    }
    function comp(){
      var num=Math.random();
      if(num>=0 && num<1/3) return 'rock';
      else if(num>=1/3 && num<2/3) return  'paper';
      else if(num>=2/3 && num<1) return 'scissor'; 
    }

    function play(pla){
      let compo=comp();
      let res;
      if(compo==pla) res='draw';
      else{
        if(pla=='paper'){
          res=compo=='rock' ? 'win' : 'lose';  
        }
        else if(pla=='scissor'){
          res=compo=='paper' ? 'win' : 'lose';
        }
        else{
          res=compo=='scissor' ? 'win' : 'lose';
        }
      
      }
      document.querySelector('.st').innerHTML=`your move: ${pla} &nbsp;&nbsp; computer move: ${compo}`;
      scoreup(res);
    }

    function scoreup(re){
      if(re=='win'){score.wins+=1}
      else if(re=='lose'){score.loses+=1}
      else{score.ties+=1}
      document.querySelector('.sc').innerHTML=`
      wins: ${score.wins} loses: ${score.loses} ties: ${score.ties}`;
      localStorage.setItem('score',JSON.stringify(score));
    }
    
  </script>
</html>
